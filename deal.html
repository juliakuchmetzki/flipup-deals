<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlipUp Deals – Deal ansehen</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f5f5; color: #111; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    header {
      background: #fff; border-bottom: 1px solid #e5e5e5;
      padding: 0 2rem; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo img { width: 32px; height: 32px; border-radius: 6px; object-fit: cover; }
    .logo-name { font-weight: 700; font-size: 16px; color: #111; }
    .logo-name span { color: #9d0208; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .product-img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      margin-bottom: 1.25rem;
      border-radius: 8px;
      background: #f9f9f9;
      padding: 1rem;
    }

    .product-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 1rem;
      color: #111;
    }

    .price-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .price {
      font-size: 1.75rem;
      font-weight: 700;
      color: #111;
    }

    .old-price {
      font-size: 14px;
      color: #aaa;
      text-decoration: line-through;
    }

    .discount {
      font-size: 12px;
      font-weight: 600;
      background: #fef2f2;
      color: #9d0208;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: #FF9900;
      color: #fff;
      text-decoration: none;
      padding: 13px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      transition: background 0.12s;
      margin-bottom: 0.75rem;
    }
    .btn-primary:hover { background: #e68a00; }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: #fff;
      color: #111;
      text-decoration: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid #e5e5e5;
      transition: background 0.12s;
      margin-bottom: 1.25rem;
    }
    .btn-secondary:hover { background: #f5f5f5; }

    .disclosure {
      font-size: 11px;
      color: #999;
      text-align: center;
      line-height: 1.6;
      border-top: 1px solid #f0f0f0;
      padding-top: 1rem;
    }

    .asin-row {
      font-size: 11px;
      color: #bbb;
      margin-bottom: 1rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #999;
      text-decoration: none;
      margin-bottom: 1rem;
    }
    .back-link:hover { color: #111; }

    .loading { text-align: center; padding: 3rem; color: #999; font-size: 14px; }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">
    <img src="https://i.ibb.co/GBfz3qm/flipuplogo.png" alt="FlipUp" />
    <div class="logo-name">FlipUp <span>Deals</span></div>
  </a>
</header>

<main>
  <div class="card" id="card">
    <div class="loading">Deal wird geladen...</div>
  </div>
</main>

<script>
  const FLAGS = { de:'🇩🇪', fr:'🇫🇷', it:'🇮🇹', es:'🇪🇸', at:'🇦🇹' };
  const DOMAINS = { de:'amazon.de', fr:'amazon.fr', it:'amazon.it', es:'amazon.es', at:'amazon.at' };

  const TAGS = {
    de: 'flipupdeals-21',
    fr: 'flipupdeals06-21',
    it: 'flipupdeal00a-21',
    es: 'flipupdeals0a-21',
    at: 'flipupdeals-21',
  };

  async function loadDeal() {
    const params = new URLSearchParams(window.location.search);
    const asin = params.get('asin');
    const marketplace = params.get('marketplace') || 'de';
    const ekMarketplace = params.get('ek') || marketplace; // EK-Marktplatz (günstigstes Land)

    if (!asin) {
      document.getElementById('card').innerHTML = '<div class="loading">Kein Deal gefunden.</div>';
      return;
    }

    // Deal aus API laden
    let deal = null;
    try {
      const r = await fetch('https://api.flipup-deals.de/api/deals.json');
      if (r.ok) {
        const deals = await r.json();
        deal = deals.find(d => d.asin === asin && d.marketplace === marketplace);
      }
    } catch {}

    const tag = TAGS[marketplace] || TAGS.de;
    const ekTag = TAGS[ekMarketplace] || TAGS.de;
    const flag = FLAGS[marketplace] || '🛒';
    const ekFlag = FLAGS[ekMarketplace] || flag;
    const domain = DOMAINS[marketplace] || 'amazon.de';
    const ekDomain = DOMAINS[ekMarketplace] || domain;

    // Affiliate URLs
    const deUrl = `https://www.${domain}/dp/${asin}?tag=${tag}&linkCode=ogi&th=1&psc=1`;
    const ekUrl = `https://www.${ekDomain}/dp/${asin}?tag=${ekTag}&linkCode=ogi&th=1&psc=1`;

    const title = deal?.title || 'Produkt auf Amazon ansehen';
    const price = deal?.price ? `€${deal.price.toFixed(2)}` : null;
    const oldPrice = deal?.oldPrice ? `€${deal.oldPrice.toFixed(2)}` : null;
    const pct = (deal?.price && deal?.oldPrice) ? Math.round((1 - deal.price/deal.oldPrice)*100) : null;
    const image = deal?.image || `https://m.media-amazon.com/images/I/${asin}._SL500_.jpg`;

    // Titel setzen
    document.title = `${title.substring(0,60)} – FlipUp Deals`;

    const showEkButton = ekMarketplace !== marketplace;

    document.getElementById('card').innerHTML = `
      <a href="/" class="back-link">← Zurück zu allen Deals</a>
      <img class="product-img" src="${image}" alt="${title}"
        onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect width=%22200%22 height=%22200%22 fill=%22%23f5f5f5%22/></svg>'" />
      <div class="product-title">${title}</div>
      ${price ? `
      <div class="price-row">
        <div class="price">${price}</div>
        ${oldPrice ? `<div class="old-price">${oldPrice}</div>` : ''}
        ${pct ? `<div class="discount">-${pct}%</div>` : ''}
      </div>` : ''}
      <div class="asin-row">ASIN: ${asin}</div>

      <a class="btn-primary" href="${deUrl}" target="_blank" rel="nofollow sponsored">
        ${flag} Bei ${domain} ansehen →
      </a>

      ${showEkButton ? `
      <a class="btn-secondary" href="${ekUrl}" target="_blank" rel="nofollow sponsored">
        ${ekFlag} Günstigster Preis bei ${ekDomain} →
      </a>` : ''}

      <div class="disclosure">
        * Als Amazon-Affiliate-Partner verdienen wir an qualifizierten Verkäufen.
        Für dich entstehen keine Mehrkosten.
      </div>
    `;
  }

  loadDeal();
</script>
</body>
</html>
